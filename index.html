<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logoASR.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=public-sans:400,500,600,700" rel="stylesheet" />
  <title>График</title>
  <meta name="description" content="График заместителей">
  <meta property="og:title" content="График">
  <meta property="og:description" content="График заместителей">
  <meta property="og:image" content="https://ui.nuxt.com/assets/templates/vue/dashboard-light.png">
  <meta name="twitter:card" content="summary_large_image">
  <style>html { background-color: #ffffff } html.dark { background-color: #18181b }</style>
  <script>
    (function () {
      var mode = localStorage.getItem('vueuse-color-scheme') || 'auto'
      var dark = mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)
      if (dark) {
        document.documentElement.classList.add('dark')
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#18181b')
      }
    })()
  </script>
</head>

<body>
  <div id="app" class="isolate"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
